<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>29 — Trump &amp; Trick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --felt-1:#0b3d2e;
  --felt-2:#0e4a37;
  --cream:#f3ead8;
  --ink:#1c1712;
  --gold:#c9a227;
  --gold-soft:#e6c65c;
  --red:#a83a3a;
  --teal:#2f6f62;
  --line: rgba(243,234,216,0.14);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;background:var(--felt-1);
  font-family:'Inter',sans-serif; color:var(--cream); overflow:hidden;
  overscroll-behavior:none;}
body{
  background:
    radial-gradient(ellipse at 50% 20%, var(--felt-2), var(--felt-1) 70%);
}
.wrap{
  position:relative; width:100%; display:flex; flex-direction:column;
  height:100vh; height:100svh; height:100dvh; height:calc(var(--vh, 1vh) * 100);
  overflow:hidden;
}

/* ---------------- LANDING / LOBBY SCREENS ---------------- */
.screen{
  position:fixed; inset:0; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:22px; text-align:center; z-index:100;
  height:100vh; height:100svh; height:100dvh; height:calc(var(--vh, 1vh) * 100);
  overflow-y:auto;
}
.screen.hidden{display:none;}
.brandTitle{font-family:'Cinzel',serif; font-weight:700; letter-spacing:2px; color:var(--gold-soft); font-size:26px; margin-bottom:2px;}
.brandSub{font-size:12px; opacity:0.75; margin-bottom:26px;}
.card3{
  background:rgba(0,0,0,0.25); border:1px solid var(--line); border-radius:14px;
  padding:20px 18px; width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px;
}
.card3 h2{font-family:'Cinzel',serif; font-size:16px; color:var(--gold-soft); margin:0 0 2px;}
.card3 p{font-size:12.5px; opacity:0.8; margin:0; line-height:1.5;}
.field{
  background:rgba(0,0,0,0.3); border:1px solid var(--line); border-radius:9px;
  padding:11px 12px; color:var(--cream); font-size:14px; font-family:'Inter'; width:100%;
}
.field::placeholder{color:rgba(243,234,216,0.45);}
.stackbtns{display:flex; flex-direction:column; gap:9px;}
.btn{
  border:1px solid var(--gold); background:rgba(201,162,39,0.12); color:var(--cream);
  padding:11px 14px; border-radius:9px; font-size:13.5px; font-weight:600; font-family:'Inter';
}
.btn.primary{ background:var(--gold); color:var(--ink);}
.btn.ghost{ border-color:var(--line); background:rgba(0,0,0,0.2);}
.btn.small{padding:7px 11px; font-size:12px;}
.btn:disabled{opacity:0.35;}
.rowbtns{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.linkbox{
  display:flex; gap:6px; align-items:center; background:rgba(0,0,0,0.35);
  border:1px dashed var(--line); border-radius:9px; padding:8px 10px; font-size:11.5px;
  word-break:break-all;
}
.seatgrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:340px; margin:0 auto;}
.seattile{
  border:1px solid var(--line); border-radius:10px; padding:10px 8px; background:rgba(0,0,0,0.25);
  font-size:12px; display:flex; flex-direction:column; gap:3px; min-height:56px; justify-content:center;
}
.seattile.mine{border-color:var(--gold-soft);}
.seattile.selectable{cursor:pointer;}
.seattile.selected{border-color:var(--gold); background:rgba(201,162,39,0.18);}
.seattile .teamtag{font-size:9px; letter-spacing:1px; opacity:0.6; text-transform:uppercase;}
.seattile .occ{font-weight:600; font-size:13px;}
.teamA{color:#9fd7c2;}
.teamB{color:#e0a5a5;}
.smallnote{font-size:11px; opacity:0.65; line-height:1.5;}

/* ---------------- top bar ---------------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; z-index:20;
  border-bottom:1px solid var(--line);
  background:rgba(0,0,0,0.15);
}
.brand{font-family:'Cinzel',serif; font-weight:700; letter-spacing:2px; font-size:15px; color:var(--gold-soft);}
.brand span{color:var(--cream); font-weight:600; letter-spacing:0;}
.scorepods{display:flex; gap:8px; align-items:center;}
.pod{
  display:flex; flex-direction:column; align-items:center;
  padding:3px 10px; border-radius:8px; border:1px solid var(--line);
  background:rgba(0,0,0,0.2); min-width:52px;
}
.pod .lbl{font-size:9px; letter-spacing:1px; opacity:0.7; text-transform:uppercase;}
.pod .val{font-family:'Cinzel',serif; font-size:18px; font-weight:700; color:var(--gold-soft);}
.menubtn{
  background:none; border:1px solid var(--line); color:var(--cream);
  border-radius:7px; padding:5px 9px; font-size:11px; font-family:'Inter';
}
.menubtn.hiddenBtn{visibility:hidden;}

/* ---- board / boxes for double board mode ---- */
.boardstrip{display:flex; gap:6px; padding:6px 12px; background:rgba(0,0,0,0.12); border-bottom:1px solid var(--line);}
.box{flex:1; display:flex; gap:4px;}
.cell{flex:1; height:16px; border-radius:3px; border:1px solid var(--line); opacity:0.35;}
.cell.red{background:var(--red);}
.cell.black{background:#111; }
.cell.filled{opacity:1;}
.boxlabel{font-size:9px; opacity:0.6; align-self:center; width:70px;}

/* ---- table ---- */
.table{
  position:relative; flex:1; min-height:0;
  display:grid;
  grid-template-rows: minmax(56px,74px) minmax(0,1fr) minmax(100px,150px);
  padding:6px 8px 4px;
}
.seat{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:11px; position:relative;
}
.seat .name{
  font-weight:600; padding:2px 9px; border-radius:20px;
  background:rgba(0,0,0,0.25); border:1px solid var(--line);
  max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.seat.active .name{ border-color:var(--gold); color:var(--gold-soft); box-shadow:0 0 10px rgba(201,162,39,0.35);}
.seat.bidder .name::after{content:" ★"; color:var(--gold-soft);}
.seat .cardback-row{display:flex;}
.cardback{
  width:22px; height:31px; margin-left:-13px; border-radius:4px;
  background:linear-gradient(135deg, var(--teal), #1c4b40);
  border:1px solid rgba(243,234,216,0.35);
}
.cardback:first-child{margin-left:0;}

#seatTop{ align-self:start; justify-self:center; }
.midRow{ display:flex; align-items:center; justify-content:space-between; position:relative;}
#seatLeft, #seatRight{ align-self:center; }

.centerTrick{
  flex:1; position:relative; display:flex; align-items:center; justify-content:center;
  min-height:120px;
}
.trickslot{
  position:absolute; width:44px; height:62px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  transition: all .25s ease;
}
#slotBottom{ bottom:2px; }
#slotLeft{ left:6px; top:50%; transform:translateY(-50%);}
#slotTop{ top:2px; }
#slotRight{ right:6px; top:50%; transform:translateY(-50%);}

.trumpseed{
  position:absolute; top:-10px; right:-10px; width:45px; height:63px; border-radius:7px;
  background:linear-gradient(135deg, #3a2b0e, #1c1712);
  border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; text-align:center; color:var(--gold-soft); font-family:'Cinzel';
  z-index:17;
}
.trumpseed.revealed{ background:var(--cream); color:var(--ink); }
.centerActions{
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:16;
  display:flex; flex-direction:column; gap:6px; align-items:center;
}
.centerActions:empty{ display:none; }
.centerActions .btn{
  background:rgba(6,32,24,0.9); box-shadow:0 4px 10px rgba(0,0,0,0.4);
}
.tableToast{
  position:absolute; left:50%; top:-46px; transform:translate(-50%,-8px);
  background:rgba(201,162,39,0.95); color:var(--ink); font-weight:700; font-size:12px;
  padding:8px 14px; border-radius:20px; white-space:nowrap; z-index:20;
  opacity:0; pointer-events:none; transition:opacity .3s ease, transform .3s ease;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}
.tableToast.show{ opacity:1; transform:translate(-50%,0); }

/* ---- hand ---- */
.handzone{ display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:6px;}
.hand{
  display:flex; flex-wrap:wrap; justify-content:center; align-content:flex-end;
  gap:6px 5px; padding:4px 10px; max-width:352px; margin:0 auto;
}
.card{
  width:80px; height:120px; background:var(--cream); border-radius:10px;
  box-shadow:0 3px 7px rgba(0,0,0,0.4);
  border:1px solid rgba(0,0,0,0.15); flex-shrink:0;
  display:flex; flex-direction:column; justify-content:space-between; padding:6px 7px;
  color:var(--ink); font-weight:700; position:relative; transition: transform .15s ease;
}
.card.red{color:var(--red);}
.card.playable{ transform:translateY(-10px); box-shadow:0 8px 14px rgba(0,0,0,0.5);}
.card.disabled{ filter:grayscale(0.6) brightness(0.75);}
.card .rank{font-size:16px; font-family:'Cinzel',serif;}
.card .suit{font-size:24px; align-self:center;}
.card .rank.bottom{ align-self:flex-end; transform:rotate(180deg); }

.trickcard{ width:52px; height:74px; }
.trickcard .rank{font-size:13px;}
.trickcard .suit{font-size:17px;}

/* ---- action panel ---- */
.panel{
  position:absolute; left:0; right:0; bottom:0; z-index:30;
  background:linear-gradient(180deg, rgba(11,61,46,0), rgba(6,32,24,0.96) 30%);
  padding:8px 10px 10px; display:flex; flex-direction:column; gap:8px;
  align-items:center;
}
.panel .msg{font-size:12.5px; text-align:center; color:var(--gold-soft); font-family:'Cinzel',serif; min-height:16px;}
.btn.suit-S,.btn.suit-C{color:var(--cream);}
.btn.suit-H,.btn.suit-D{color:#ffb3b3;}

.log{
  position:absolute; top:64px; right:6px; width:220px; max-height:200px; overflow:auto;
  background:rgba(0,0,0,0.85); border:1px solid var(--line); border-radius:8px; padding:8px;
  font-size:11px; line-height:1.5; z-index:40; display:none;
}
.log.show{display:block;}
.overlay{
  position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:50;
  display:flex; align-items:center; justify-content:center;
}
.overlay .card2{
  background:var(--felt-2); border:1px solid var(--gold); border-radius:14px;
  padding:22px 24px; max-width:320px; max-height:85vh; overflow-y:auto; text-align:center;
}
.overlay h2{font-family:'Cinzel',serif; color:var(--gold-soft); margin:0 0 8px;}
.overlay p{font-size:13px; opacity:0.9; line-height:1.5;}
.hidden{display:none !important;}
</style>
</head>
<body>

<!-- ============ LANDING / LOBBY SCREENS ============ -->
<div class="screen" id="screenHome">
  <div class="brandTitle">29 <span style="color:var(--cream)">Trump &amp; Trick</span></div>
  <div class="brandSub">Multiplayer card game for you and your friends</div>
  <div class="card3">
    <div class="stackbtns">
      <button class="btn primary" id="btnHostNew">Host a New Game</button>
      <button class="btn ghost" id="btnJoinCode">Join with a Code</button>
    </div>
  </div>
</div>

<div class="screen hidden" id="screenName">
  <div class="card3">
    <h2 id="nameScreenTitle">Enter your name</h2>
    <input class="field" id="nameInput" placeholder="Your name" maxlength="18" autocomplete="off">
    <button class="btn primary" id="btnNameContinue">Continue</button>
  </div>
</div>

<div class="screen hidden" id="screenHostSetup">
  <div class="card3">
    <h2>Who's playing?</h2>
    <p>Choose your table mix — you can share the link with friends after.</p>
    <div class="stackbtns">
      <button class="btn" data-cpu="0">4 Friends (no computers)</button>
      <button class="btn" data-cpu="1">3 Friends + 1 Computer</button>
      <button class="btn" data-cpu="2">2 Friends + 2 Computers</button>
      <button class="btn" data-cpu="3">1 Friend + 3 Computers</button>
    </div>
  </div>
</div>

<div class="screen hidden" id="screenLobby">
  <div class="card3" style="max-width:380px;">
    <h2 id="lobbyTitle">Lobby</h2>
    <div id="lobbyLinkWrap"></div>
    <div id="lobbyPlayerList" class="smallnote" style="text-align:left;"></div>
    <div id="lobbySeatWrap"></div>
    <div id="lobbyBoardModeWrap"></div>
    <div id="lobbyStartWrap"></div>
    <p class="smallnote" id="lobbyWaitNote"></p>
  </div>
</div>

<!-- ============ GAME SCREEN ============ -->
<div class="wrap hidden" id="wrap">
  <div class="topbar">
    <div class="brand">29 <span>Trump &amp; Trick</span></div>
    <div class="scorepods">
      <div class="pod"><div class="lbl" id="teamAlabel">Team A</div><div class="val" id="scoreA">0</div></div>
      <div class="pod"><div class="lbl" id="teamBlabel">Team B</div><div class="val" id="scoreB">0</div></div>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px; align-items:flex-end;">
      <button class="menubtn" id="newGameBtn">Play Again</button>
      <button class="menubtn" id="logToggle">Log</button>
    </div>
  </div>

  <div class="boardstrip" id="boardstrip"></div>

  <div class="table" id="tableArea">
    <div class="seat" id="seatTop">
      <div class="name">Top</div>
      <div class="cardback-row" id="cbTop"></div>
    </div>

    <div class="midRow">
      <div class="seat" id="seatLeft">
        <div class="name">Left</div>
        <div class="cardback-row" id="cbLeft"></div>
      </div>

      <div class="centerTrick" id="centerTrick">
        <div class="trumpseed" id="trumpSeed">trump<br>hidden</div>
        <div class="centerActions" id="centerActions"></div>
        <div class="tableToast" id="tableToast"></div>
        <div class="trickslot" id="slotBottom"></div>
        <div class="trickslot" id="slotLeft"></div>
        <div class="trickslot" id="slotTop"></div>
        <div class="trickslot" id="slotRight"></div>
      </div>

      <div class="seat" id="seatRight">
        <div class="name">Right</div>
        <div class="cardback-row" id="cbRight"></div>
      </div>
    </div>

    <div class="seat" id="seatBottom" style="justify-self:center;">
      <div class="name">You</div>
    </div>
  </div>

  <div class="handzone">
    <div class="hand" id="handRow"></div>
  </div>

  <div class="log" id="logBox"></div>

  <div class="panel">
    <div class="msg" id="panelMsg">—</div>
    <div class="rowbtns" id="panelBtns"></div>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="card2">
      <h2 id="ovTitle"></h2>
      <p id="ovText"></p>
      <div class="rowbtns" id="ovBtns" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script>
/* ================= NOTES ON ASSUMPTIONS =================
   - Turn order is anticlockwise: You(bottom) -> Right -> Top(partner) -> Left -> You.
   - Trump suit is chosen freely by the bid winner, not restricted to their own 4 cards.
   - Singles/Double (rules 9-11) give a separate +-3 / +-6 game-point swing on top of
     the normal bid result.
   - MULTIPLAYER TRUST MODEL: like your Call Break app, all game state (including the
     secret trump and other players' hands) is synced to every device via Firestore so
     the app can work at all without a server-side referee. Nothing is shown in the UI
     before it should be, but a technically curious friend could in principle open
     devtools and inspect it early. Fine for a friend-group game; flag it if you ever
     want a hardened version (would need a Cloud Function as a real referee).
   - Only the HOST's browser drives computer players' decisions and automatic steps
     (dealing, redeal checks, trick resolution timing) to keep everyone in sync and
     avoid two devices disagreeing about a random AI decision. If the host closes their
     tab mid-game, the game will stall — that's a known limitation for a future pass
     (your Call Break app's watchdog/heartbeat would be the model to copy).
   ========================================================== */

const firebaseConfig = {
  apiKey: "AIzaSyDKgkuUHrkBYz7Ze47q35kemuZBupcVB_M",
  authDomain: "callbreak-local.firebaseapp.com",
  projectId: "callbreak-local",
  storageBucket: "callbreak-local.firebasestorage.app",
  messagingSenderId: "697439144169",
  appId: "1:697439144169:web:002d7a680d81b6c8788878"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const ROOMS = 'game29_rooms';

let myUid = null;
let ROOM_CODE = null;
let ROOM = null;
let MY_SEAT = null;
let IS_HOST = false;
let selectedSeatTile = null;
let unsubRoom = null, unsubState = null;

const SUITS = ['S','H','D','C'];
const SUIT_SYM = {S:'♠', H:'♥', D:'♦', C:'♣'};
const SUIT_NAME = {S:'Spades', H:'Hearts', D:'Diamonds', C:'Clubs'};
const RED_SUITS = ['H','D'];
const RANK_ORDER = ['7','8','Q','K','10','A','9','J'];
const RANK_POINTS = {'7':0,'8':0,'Q':0,'K':0,'10':1,'A':1,'9':2,'J':3};

const ORDER = [0,3,2,1];
const PARTNER = {0:2,1:3,2:0,3:1};
const TEAM = {0:'A',2:'A',1:'B',3:'B'};

function nextSeat(s){ const i = ORDER.indexOf(s); return ORDER[(i+1)%4]; }
function prevSeat(s){ const i = ORDER.indexOf(s); return ORDER[(i+3)%4]; }

function freshDeck(){
  const d = [];
  for(const s of SUITS) for(const r of RANK_ORDER) d.push({s,r,id:s+r});
  return d;
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function rankIdx(r){ return RANK_ORDER.indexOf(r); }

let G = null;
let PLAYABLE_IDS = [];

/* ---------------- SEAT / IDENTITY HELPERS ---------------- */
function isComputerSeat(seat){ return ROOM && ROOM.seats[seat] && ROOM.seats[seat].type==='cpu'; }
function seatLabel(seat){
  if(seat===MY_SEAT) return 'You';
  if(!ROOM || !ROOM.seats[seat]) return '...';
  return ROOM.seats[seat].name || (ROOM.seats[seat].type==='cpu' ? 'Computer' : 'Player');
}
function authorizedFor(seat){
  if(isComputerSeat(seat)) return IS_HOST;
  return seat===MY_SEAT;
}
function slotOf(seat){
  if(seat===MY_SEAT) return 'Bottom';
  if(seat===nextSeat(MY_SEAT)) return 'Right';
  if(seat===PARTNER[MY_SEAT]) return 'Top';
  return 'Left';
}

/* ---------------- FIREBASE PLUMBING ---------------- */
function pushState(){
  if(!ROOM_CODE) return;
  G.seq = (G.seq||0) + 1;
  db.collection(ROOMS).doc(ROOM_CODE).collection('state').doc('current')
    .set({ blob: JSON.stringify(G), updatedAt: Date.now() })
    .catch(e=>{ console.error('pushState error', e); alert('Could not sync game state: '+e.message); });
}
function subscribeState(){
  if(unsubState) unsubState();
  unsubState = db.collection(ROOMS).doc(ROOM_CODE).collection('state').doc('current')
    .onSnapshot(doc=>{
      if(!doc.exists) return;
      const data = doc.data();
      const incoming = JSON.parse(data.blob);
      if(G && typeof G.seq==='number' && typeof incoming.seq==='number' && incoming.seq < G.seq) return;
      G = incoming;
      renderAll();
      resumeFlow();
    }, e=>{ console.error('subscribeState error', e); alert('Lost connection to the game: '+e.message); });
}
function subscribeRoom(code){
  if(unsubRoom) unsubRoom();
  unsubRoom = db.collection(ROOMS).doc(code).onSnapshot(doc=>{
    if(!doc.exists) return;
    ROOM = doc.data();
    MY_SEAT = ROOM.seats.findIndex(s=>s.uid===myUid);
    IS_HOST = (myUid===ROOM.hostUid);
    if(ROOM.status==='lobby' || ROOM.status==='seating'){
      renderLobbyScreen();
      showScreen('screenLobby');
    } else if(ROOM.status==='playing'){
      showScreen('wrap');
      document.getElementById('teamAlabel').textContent = seatLabel(0)+' & '+seatLabel(2);
      document.getElementById('teamBlabel').textContent = seatLabel(1)+' & '+seatLabel(3);
      document.getElementById('newGameBtn').classList.toggle('hiddenBtn', !IS_HOST);
      if(!unsubState) subscribeState();
    }
  }, e=>{ console.error('subscribeRoom error', e); alert('Could not load the room: '+e.message+'\n\nThis usually means Firestore security rules are blocking the "game29_rooms" collection.'); });
}

/* ---------------- SCREEN MANAGEMENT ---------------- */
function showScreen(id){
  ['screenHome','screenName','screenHostSetup','screenLobby','wrap'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}

let nameFlowMode = null; // 'host' | 'join'
let pendingJoinCode = null;
let pendingName = '';

document.getElementById('btnHostNew').addEventListener('click', ()=>{
  nameFlowMode='host';
  document.getElementById('nameScreenTitle').textContent='Your name (host)';
  showScreen('screenName');
});
document.getElementById('btnJoinCode').addEventListener('click', ()=>{
  const code = prompt('Enter the room code your friend shared:');
  if(!code) return;
  pendingJoinCode = code.trim().toUpperCase();
  nameFlowMode='join';
  document.getElementById('nameScreenTitle').textContent='Your name';
  showScreen('screenName');
});
document.getElementById('btnNameContinue').addEventListener('click', ()=>{
  const val = document.getElementById('nameInput').value.trim();
  if(!val){ alert('Please enter a name.'); return; }
  pendingName = val;
  if(nameFlowMode==='host'){
    showScreen('screenHostSetup');
  } else {
    joinRoom(pendingJoinCode, pendingName);
  }
});
document.querySelectorAll('#screenHostSetup [data-cpu]').forEach(btn=>{
  btn.addEventListener('click', ()=> createRoom(pendingName, Number(btn.dataset.cpu)));
});

function genCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c=''; for(let i=0;i<4;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function createRoom(hostName, numComputers){
  const code = genCode();
  const seats = new Array(4).fill(null);
  for(let i=0;i<numComputers;i++) seats[3-i] = {type:'cpu', uid:null, name:'Computer '+(i+1)};
  seats[0] = {type:'human', uid:myUid, name:hostName};
  for(let i=1;i<4;i++) if(!seats[i]) seats[i] = {type:'human', uid:null, name:null};
  const humansNeeded = seats.filter(s=>s.type==='human').length;
  const status = humansNeeded<=1 ? 'seating' : 'lobby';
  document.querySelectorAll('#screenHostSetup [data-cpu]').forEach(b=>b.disabled=true);
  db.collection(ROOMS).doc(code).set({
    hostUid: myUid, numComputers, humansNeeded, status, seats,
    boardMode:null, createdAt: Date.now()
  }).then(()=>{
    ROOM_CODE = code;
    subscribeRoom(code);
  }).catch(e=>{
    document.querySelectorAll('#screenHostSetup [data-cpu]').forEach(b=>b.disabled=false);
    alert('Could not create the room: '+e.message+'\n\nThis usually means the Firestore security rules for this Firebase project need to allow the "game29_rooms" collection.');
    console.error('createRoom error', e);
  });
}

function joinRoom(code, name){
  const ref = db.collection(ROOMS).doc(code);
  db.runTransaction(async (tx)=>{
    const doc = await tx.get(ref);
    if(!doc.exists) throw new Error('No room with that code.');
    const data = doc.data();
    const seats = data.seats.slice();
    const idx = seats.findIndex(s=>s.type==='human' && s.uid===null);
    if(idx===-1) throw new Error('That room is already full.');
    seats[idx] = {type:'human', uid:myUid, name};
    const filled = seats.filter(s=>s.type==='human' && s.uid).length;
    const humansNeeded = seats.filter(s=>s.type==='human').length;
    const status = filled>=humansNeeded ? 'seating' : 'lobby';
    tx.update(ref, {seats, status});
  }).then(()=>{
    ROOM_CODE = code;
    subscribeRoom(code);
  }).catch(e=>{
    alert(e.message || 'Could not join that room.');
    showScreen('screenHome');
  });
}

/* ---------------- ROUND SETUP (host-only shuffling) ---------------- */
function hostStartRound(){
  if(!IS_HOST) return;
  if(G.matchOver) return;
  const deck = shuffle(freshDeck());
  const hands = {0:[],1:[],2:[],3:[]};
  const first = nextSeat(G.dealer);
  let order4 = [];
  for(let k=0;k<4;k++) order4.push(ORDER[(ORDER.indexOf(first)+k)%4]);
  for(const seat of order4) hands[seat] = deck.splice(0,4);

  G.round = {
    deck, hands, order4, first,
    bidHistory: [], highBid: 0, highBidder: null, passed: [], starter: null,
    trump: null, trumpRevealed:false, secondOptionSeat:null,
    tricks: [], trickNo:0, leader:first,
    current: {}, leadSuit:null, playOrder:[],
    pointsA:0, pointsB:0,
    pairDeclared:{A:false,B:false},
    singles:null, doubled:false,
    phase:'bidding',
    awaiting:{type:'bid', seat:first},
    log:[]
  };
  logMsg(`— New round — dealer: ${seatLabel(G.dealer)}, first to bid: ${seatLabel(first)}`);
  pushState();
}

function handStrength(hand){
  const bySuit = {};
  for(const s of SUITS) bySuit[s] = [];
  for(const c of hand) bySuit[c.s].push(c.r);
  let best = {suit:null, score:-1};
  for(const s of SUITS){
    const cards = bySuit[s];
    let score = cards.length * 2;
    for(const r of cards) score += RANK_POINTS[r]*1.4 + (r==='9'?1:0);
    if(score>best.score) best = {suit:s, score};
  }
  return best;
}

function logMsg(msg){
  G.round.log = G.round.log || [];
  G.round.log.unshift(msg);
  if(G.round.log.length>60) G.round.log.length=60;
}

/* ---------------- DISPATCH / RESUME ---------------- */
function resumeFlow(){
  if(!G || !G.round) return;
  const rd = G.round;
  if(G.matchOver) return;
  const aw = rd.awaiting;
  if(!aw) return;
  switch(aw.type){
    case 'bid': bidTurn(aw.seat); break;
    case 'dealerForcedBid': doDealerForcedBid(aw.seat); break;
    case 'trump': doTrumpStep(aw.seat); break;
    case 'singles': doSinglesStep(aw.seat); break;
    case 'double': doDoubleStep(aw.seat); break;
    case 'play': playTurn(aw.seat); break;
    case 'redealAck': showRedealOverlay(); break;
    case 'roundEndAck': showRoundEndOverlay(); break;
    case 'matchEndAck': showMatchEndOverlay(); break;
  }
}

/* ---------------- BIDDING ---------------- */
function minAcceptableBid(seat){
  const rd = G.round;
  if(rd.highBid===0) return 16;
  // The player who actually OPENED the auction (first real bid, not just first
  // asked) may re-claim at the SAME number — everyone else must go higher.
  if(seat===rd.starter && seat!==rd.highBidder) return rd.highBid;
  return rd.highBid+1;
}
function bidTurn(seat){
  const rd = G.round;
  const passedSet = new Set(rd.passed);
  if(passedSet.size>=3 && rd.highBidder!=null){ rd.awaiting={type:'bid',seat}; finishBidding(); return; }
  if(passedSet.size===4){
    rd.awaiting = {type:'dealerForcedBid', seat: G.dealer};
    pushState();
    doDealerForcedBid(G.dealer);
    return;
  }
  if(passedSet.has(seat)){ bidTurn(nextSeat(seat)); return; } // already out of this auction
  rd.awaiting = {type:'bid', seat};
  if(!authorizedFor(seat)){
    clearDecisionUI();
    setPanelMsg(`Waiting for ${seatLabel(seat)} to bid...`);
    return;
  }
  if(seat===MY_SEAT){ presentHumanBid(); return; }
  setTimeout(()=>{
    if(!G || !G.round || G.round.awaiting.type!=='bid' || G.round.awaiting.seat!==seat) return;
    const rd = G.round; // re-read live state — G may have been replaced by a snapshot since we were scheduled
    const hand = rd.hands[seat];
    const {suit, score} = handStrength(hand);
    const minBid = minAcceptableBid(seat);
    const comfortCap = Math.min(28, Math.round(16+score/3));
    const isReclaim = (seat===rd.starter && seat!==rd.highBidder && rd.highBid>0);
    let action;
    if(rd.highBid===0){ action = (score>9) ? {bid:16} : {pass:true}; }
    else if(minBid>28){ action = {pass:true}; }
    else if(isReclaim ? minBid<=comfortCap+2 : minBid<=comfortCap){ action = {bid: minBid}; }
    else { action = {pass:true}; }
    if(action.pass){ rd.passed.push(seat); logMsg(`${seatLabel(seat)} passes.`); }
    else {
      if(rd.starter==null) rd.starter = seat;
      rd.highBid=action.bid; rd.highBidder=seat; logMsg(`${seatLabel(seat)} bids ${action.bid}.`);
    }
    advanceBid(seat);
    pushState();
  }, 550);
}
function advanceBid(seat){
  const rd = G.round;
  const passedSet = new Set(rd.passed);
  if(passedSet.size>=3 && rd.highBidder!=null){ finishBidding(); return; }
  if(passedSet.size===4){ bidTurn(nextSeat(seat)); return; }
  bidTurn(nextSeat(seat));
}
function presentHumanBid(){
  const rd = G.round;
  const minBid = minAcceptableBid(MY_SEAT);
  const isReclaim = (MY_SEAT===rd.starter && MY_SEAT!==rd.highBidder && rd.highBid>0);
  setPanelMsg('Your turn to bid.');
  setPanelBtns([]);
  const btns = [];
  for(let v=minBid; v<=28; v++){
    const label = (v===minBid && isReclaim) ? `Match ${v}` : `Bid ${v}`;
    btns.push({label, cls: v===minBid?'primary':'', fn:()=>{
      hideOverlay();
      if(rd.starter==null) rd.starter = MY_SEAT;
      rd.highBid = v; rd.highBidder = MY_SEAT;
      logMsg(v===minBid && isReclaim ? `You match ${v} (started the auction).` : `You bid ${v}.`);
      advanceBid(MY_SEAT);
      pushState();
    }});
  }
  btns.push({label:'Pass', cls:'ghost', fn:()=>{
    hideOverlay();
    rd.passed.push(MY_SEAT);
    logMsg('You pass.');
    advanceBid(MY_SEAT);
    pushState();
  }});
  const explain = isReclaim
    ? `Current high bid: ${rd.highBid}. You started this auction, so you can re-claim it at ${rd.highBid} or bid higher.`
    : `Current high bid: ${rd.highBid||'none'}. You must bid higher, or pass.`;
  showOverlay('Your Bid', explain, btns);
}
function finishBidding(){
  const rd = G.round;
  logMsg(`${seatLabel(rd.highBidder)} won the bid at ${rd.highBid}.`);
  rd.awaiting = {type:'trump', seat: rd.highBidder};
  doTrumpStep(rd.highBidder);
  pushState();
}
function doDealerForcedBid(seat){
  if(!authorizedFor(seat)){
    clearDecisionUI();
    setPanelMsg(`Everyone passed — waiting for ${seatLabel(seat)} (the dealer) to bid...`);
    return;
  }
  const rd = G.round;
  if(seat===MY_SEAT){
    setPanelMsg('Everyone passed — as dealer you must bid.');
    setPanelBtns([]);
    const btns = [];
    for(let v=16; v<=28; v++){
      btns.push({label:`Bid ${v}`, cls: v===16?'primary':'', fn:()=>{
        hideOverlay();
        rd.starter = MY_SEAT; rd.highBid = v; rd.highBidder = MY_SEAT;
        logMsg(`Everyone passed — as dealer, you bid ${v}.`);
        finishBidding();
      }});
    }
    showOverlay('Everyone Passed', 'As dealer, you must choose a bid between 16 and 28 — you cannot pass.', btns);
    return;
  }
  // computer dealer: forced to pick something, so just use their comfort estimate (floor 16)
  const {score} = handStrength(rd.hands[seat]);
  const bid = Math.max(16, Math.min(28, Math.round(16+score/3)));
  rd.starter = seat; rd.highBid = bid; rd.highBidder = seat;
  logMsg(`Everyone passed — as dealer, ${seatLabel(seat)} must bid ${bid}.`);
  finishBidding();
}

/* ---------------- TRUMP ---------------- */
function doTrumpStep(seat){
  if(!authorizedFor(seat)){
    clearDecisionUI();
    setPanelMsg(`Waiting for ${seatLabel(seat)} to choose trump...`);
    return;
  }
  if(seat===MY_SEAT){ presentTrumpChoice(); return; }
  const {suit} = handStrength(G.round.hands[seat]);
  setTrump(suit);
}
function presentTrumpChoice(){
  setPanelMsg('Choosing trump...');
  setPanelBtns([]);
  const btns = SUITS.map(s=>({label:`${SUIT_SYM[s]} ${SUIT_NAME[s]}`, cls:'suit-'+s,
    fn:()=>{ hideOverlay(); setTrump(s); }}));
  btns.push({label:'2nd (blind pick)', cls:'ghost', fn:()=>{ hideOverlay(); startSecondOption(); }});
  showOverlay('You Won the Bid!', 'Secretly choose your trump suit, or use "2nd" to blind-pick trump from your next four cards instead — even you will not know which suit until you pick.', btns);
}
function startSecondOption(){
  const rd = G.round;
  const cards = rd.deck.splice(0,4);
  rd.pendingSecondOption = cards;
  logMsg(`${seatLabel(MY_SEAT)} is choosing trump using the "2nd" option.`);
  announce(`${seatLabel(MY_SEAT)} is choosing trump via the "2nd" option`);
  pushState();
  presentSecondOptionPicker(cards);
}
function presentSecondOptionPicker(cards){
  setPanelMsg('Pick one face-down card to secretly set your trump suit.');
  const btns = cards.map((c,i)=>({label:`Face-Down Card ${i+1}`, cls:'ghost', fn:()=>{
    hideOverlay();
    finishSecondOption(cards, i);
  }}));
  showOverlay('Choose a Face-Down Card', 'One of these four cards will secretly become your trump suit.', btns);
}
function finishSecondOption(cards, idx){
  const rd = G.round;
  const chosen = cards[idx];
  rd.trump = chosen.s;
  rd.trumpRevealed = false;
  rd.hands[MY_SEAT].push(...cards);
  rd.secondOptionSeat = MY_SEAT;
  rd.pendingSecondOption = null;
  logMsg(`${seatLabel(MY_SEAT)} secretly set trump via the "2nd" option.`);
  dealRemaining();
}
function setTrump(suit){
  const rd = G.round;
  rd.trump = suit;
  rd.trumpRevealed = false;
  logMsg(`Trump chosen secretly by ${seatLabel(rd.highBidder)}.`);
  dealRemaining();
}

function dealRemaining(){
  const rd = G.round;
  for(const seat of rd.order4){
    if(seat===rd.secondOptionSeat) continue; // already received their next 4 via the "2nd" option
    rd.hands[seat].push(...rd.deck.splice(0,4));
  }

  for(const seat of [0,1,2,3]){
    const js = rd.hands[seat].filter(c=>c.r==='J').length;
    if(js===4){
      logMsg(`${seatLabel(seat)} was dealt all four Jacks — round cancelled.`);
      rd.awaiting = {type:'redealAck', reason:'jacks', seat};
      pushState();
      showRedealOverlay();
      return;
    }
  }
  const partner = PARTNER[rd.highBidder];
  const teamTrumpCount = rd.hands[rd.highBidder].filter(c=>c.s===rd.trump).length
                       + rd.hands[partner].filter(c=>c.s===rd.trump).length;
  if(teamTrumpCount===0){
    logMsg('Bidding side has no trump cards at all — round cancelled.');
    rd.awaiting = {type:'redealAck', reason:'notrump', seat:rd.highBidder};
    pushState();
    showRedealOverlay();
    return;
  }

  rd.awaiting = {type:'singles', seat: rd.highBidder};
  pushState();
  doSinglesStep(rd.highBidder);
}

/* ---------------- SINGLES / DOUBLE ---------------- */
function doSinglesStep(seat){
  if(!authorizedFor(seat)){
    clearDecisionUI();
    setPanelMsg(`Waiting for ${seatLabel(seat)}'s Singles decision...`);
    return;
  }
  const rd = G.round;
  if(seat===MY_SEAT){
    setPanelMsg('Singles decision...');
    setPanelBtns([]);
    showOverlay('Play Singles?', 'All 8 cards are dealt. Go it alone for a shot at +3 game points, or risk -3 if you miss even one trick.', [
      {label:'Play Singles', cls:'primary', fn:()=>{ hideOverlay(); rd.singles=MY_SEAT; logMsg('You go Singles.'); afterSingles(); }},
      {label:'Play Normally', cls:'ghost', fn:()=>{ hideOverlay(); afterSingles(); }}
    ]);
    return;
  }
  const hand = rd.hands[seat];
  const {score} = handStrength(hand);
  if(score>16 && Math.random()<0.3){ rd.singles=seat; logMsg(`${seatLabel(seat)} goes Singles!`); }
  afterSingles();
}
function afterSingles(){
  const rd = G.round;
  if(rd.singles==null){ beginPlay(); return; }
  const opponentSeat = nextSeat(rd.singles);
  rd.awaiting = {type:'double', seat: opponentSeat};
  pushState();
  doDoubleStep(opponentSeat);
}
function doDoubleStep(seat){
  if(!authorizedFor(seat)){
    clearDecisionUI();
    setPanelMsg(`Waiting for ${seatLabel(seat)}'s Double decision...`);
    return;
  }
  const rd = G.round;
  if(seat===MY_SEAT){
    setPanelMsg('Double decision...');
    setPanelBtns([]);
    showOverlay('Double the Stakes?', `${seatLabel(rd.singles)} is playing Singles. Double means their +3/-3 becomes +6/-6.`, [
      {label:'Double', cls:'primary', fn:()=>{ hideOverlay(); rd.doubled=true; logMsg('Double called.'); beginPlay(); }},
      {label:'No thanks', cls:'ghost', fn:()=>{ hideOverlay(); beginPlay(); } },
    ]);
    return;
  }
  if(Math.random()<0.35){ rd.doubled=true; logMsg(`${seatLabel(seat)} doubles the Singles bet.`); }
  beginPlay();
}

/* ---------------- PLAY ---------------- */
function beginPlay(){
  const rd = G.round;
  rd.phase='play';
  rd.leader = rd.first;
  rd.awaiting = {type:'play', seat: rd.leader};
  pushState();
  playTurn(rd.leader);
}
function legalCards(seat){
  const rd = G.round;
  const hand = rd.hands[seat];
  const ledSuit = rd.leadSuit;
  if(!ledSuit) return hand.slice();
  const followers = hand.filter(c=>c.s===ledSuit);
  return followers.length>0 ? followers : hand.slice();
}
function seatOutOfPlay(seat){
  const rd = G.round;
  if(rd.singles==null) return false;
  return seat===PARTNER[rd.singles];
}
function playTurn(seat){
  const rd = G.round;
  if(seatOutOfPlay(seat)){ playTurn(nextSeat(seat)); return; }
  rd.awaiting = {type:'play', seat};
  const legal = legalCards(seat);
  if(legal.length===1 && rd.hands[seat].length===1){
    if(!authorizedFor(seat)) return;
    playCard(seat, legal[0]);
    return;
  }
  if(!authorizedFor(seat)){
    clearDecisionUI();
    setPanelMsg(`Waiting for ${seatLabel(seat)}...`);
    setPlayable([]);
    return;
  }
  if(seat===MY_SEAT){ presentHumanPlay(legal); }
  else { setTimeout(()=>{
    if(!G || !G.round || G.round.awaiting.type!=='play' || G.round.awaiting.seat!==seat) return;
    computerPlay(seat, legalCards(seat));
  }, 700); }
}
function legalIsDiscardOnly(seat){
  const rd = G.round;
  const hand = rd.hands[seat];
  if(!rd.leadSuit) return false;
  return !hand.some(c=>c.s===rd.leadSuit);
}
function presentHumanPlay(legal){
  setPanelMsg('Your turn — tap a highlighted card to play it.');
  setPanelBtns([]);
  setPlayable(legal.map(c=>c.id));
  const rd = G.round;
  const trumpKQ = rd.hands[MY_SEAT].filter(c=>c.s===rd.trump && (c.r==='K'||c.r==='Q'));
  const myTeam = TEAM[MY_SEAT];
  const btns = [];
  if(trumpKQ.length===2 && !rd.pairDeclared[myTeam]){
    btns.push({label:'Declare Pair (+4)', cls:'primary', fn:()=>{
      rd.pairDeclared[myTeam]=true;
      logMsg('You declare the pair (King+Queen of trump) — +4 bonus noted.');
      pushState();
      presentHumanPlay(legal);
    }});
  }
  if(rd.leadSuit && legal.some(c=>c.s!==rd.leadSuit) && legalIsDiscardOnly(MY_SEAT) && !rd.trumpRevealed && rd.highBidder!==MY_SEAT){
    btns.push({label:'Guess Trump Suit', cls:'ghost', fn:()=>offerTrumpGuess(MY_SEAT)});
  }
  setCenterActions(btns);
}
function offerTrumpGuess(seat){
  setCenterActions([]);
  const btns = SUITS.map(s=>({label:`${SUIT_SYM[s]} ${SUIT_NAME[s]}`, cls:'suit-'+s, fn:()=>{ hideOverlay(); resolveTrumpGuess(seat,s); }}));
  btns.push({label:'Cancel', cls:'ghost', fn:()=>{ hideOverlay(); presentHumanPlay(legalCards(seat)); }});
  showOverlay('Guess the Trump Suit', 'Guess right and you trump into this trick. Guess wrong and you must discard normally.', btns);
}
function resolveTrumpGuess(seat, guess){
  const rd = G.round;
  if(guess===rd.trump){
    logMsg(`${seatLabel(seat)} guessed the trump suit correctly! Trump revealed: ${SUIT_SYM[rd.trump]} ${SUIT_NAME[rd.trump]}.`);
    rd.trumpRevealed = true;
    const trumpCards = rd.hands[seat].filter(c=>c.s===rd.trump);
    if(seat===MY_SEAT){
      pushState();
      setPlayable(trumpCards.map(c=>c.id));
      setPanelMsg('Correct! Choose your trump card to play.');
      setPanelBtns([]);
    } else {
      const pick = trumpCards[Math.floor(Math.random()*trumpCards.length)];
      playCard(seat, pick);
    }
  } else {
    logMsg(`${seatLabel(seat)} guessed wrong — must discard normally.`);
    if(seat===MY_SEAT){
      pushState();
      setPlayable(rd.hands[MY_SEAT].filter(c=>c.s!==rd.leadSuit).map(c=>c.id));
      setPanelMsg('Wrong guess — pick any card to discard.');
      setPanelBtns([]);
    } else {
      const discardable = rd.hands[seat].filter(c=>c.s!==rd.leadSuit);
      const pick = discardable[Math.floor(Math.random()*discardable.length)];
      playCard(seat, pick);
    }
  }
}
function computerPlay(seat, legal){
  const rd = G.round;
  let choice;
  if(rd.leadSuit && legalIsDiscardOnly(seat)){
    const trumpsInHand = legal.filter(c=>c.s===rd.trump);
    if(seat===rd.highBidder && trumpsInHand.length>0 && !rd.trumpRevealed){
      choice = trumpsInHand[0];
      rd.trumpRevealed = true;
      logMsg(`${seatLabel(seat)} plays a trump — trump revealed: ${SUIT_SYM[rd.trump]} ${SUIT_NAME[rd.trump]}.`);
    } else if(seat!==rd.highBidder && !rd.trumpRevealed && Math.random()<0.25){
      const guess = SUITS[Math.floor(Math.random()*4)];
      resolveTrumpGuess(seat, guess);
      return;
    } else if(rd.trumpRevealed && trumpsInHand.length>0 && Math.random()<0.6){
      choice = trumpsInHand[0];
    } else {
      const nonTrump = legal.filter(c=>c.s!==rd.trump);
      choice = (nonTrump.length? nonTrump: legal)[0];
    }
  } else {
    choice = legal.slice().sort((a,b)=>rankIdx(a.r)-rankIdx(b.r))[0];
  }
  playCard(seat, choice);
}
function playCard(seat, card){
  const rd = G.round;
  rd.hands[seat] = rd.hands[seat].filter(c=>c.id!==card.id);
  rd.current[seat] = card;
  rd.playOrder = rd.playOrder || [];
  rd.playOrder.push(seat);
  if(!rd.leadSuit) rd.leadSuit = card.s;
  logMsg(`${seatLabel(seat)} plays ${card.r}${SUIT_SYM[card.s]}.`);
  const playedSeats = Object.keys(rd.current).map(Number);
  const outCount = rd.singles!=null ? 1 : 0;
  if(playedSeats.length + outCount === 4){
    rd.awaiting = {type:'trickPause'};
    pushState();
    setTimeout(resolveTrick, 700);
  } else {
    playTurn(nextSeat(seat));
    pushState();
  }
}
function beats(card, currentBest, rd){
  const trump = rd.trumpRevealed ? rd.trump : null;
  const cIsTrump = trump && card.s===trump;
  const bIsTrump = trump && currentBest.s===trump;
  if(cIsTrump && !bIsTrump) return true;
  if(!cIsTrump && bIsTrump) return false;
  if(cIsTrump && bIsTrump) return rankIdx(card.r) > rankIdx(currentBest.r);
  if(card.s!==currentBest.s) return false;
  return rankIdx(card.r) > rankIdx(currentBest.r);
}
function resolveTrick(){
  const rd = G.round;
  const entries = rd.playOrder.map(s=>({seat:s, card:rd.current[s]}));
  let winner = entries[0];
  for(const e of entries.slice(1)) winner = beats(e.card, winner.card, rd) ? e : winner;
  const pts = entries.reduce((sum,e)=>sum+RANK_POINTS[e.card.r],0);
  const team = TEAM[winner.seat];
  if(team==='A') rd.pointsA += pts; else rd.pointsB += pts;
  rd.tricks.push({winner:winner.seat, cards:entries, pts});
  logMsg(`${seatLabel(winner.seat)} wins the trick (${pts} pts).`);

  rd.current = {}; rd.leadSuit = null; rd.playOrder = []; rd.trickNo++;

  const cardsLeft = rd.hands[rd.first].length;
  if(cardsLeft===0){
    rd.awaiting = {type:'trickPause'};
    pushState();
    setTimeout(endRound, 400);
  } else {
    rd.leader = winner.seat;
    rd.awaiting = {type:'play', seat: winner.seat};
    pushState();
    setTimeout(()=>playTurn(winner.seat), 400);
  }
}

/* ---------------- ROUND END / SCORING ---------------- */
function endRound(){
  const rd = G.round;
  if(!rd.trumpRevealed){
    logMsg('The round finished without the trump suit ever being shown — round cancelled.');
    rd.awaiting = {type:'redealAck', reason:'notrumpshown', seat:rd.highBidder};
    pushState();
    return;
  }
  const bidTeam = TEAM[rd.highBidder];
  const bidTeamPts = bidTeam==='A' ? rd.pointsA : rd.pointsB;
  const madeIt = bidTeamPts >= rd.highBid;
  let gamePts = madeIt ? 1 : -1;

  let singlesNote = '', singlesGamePts = 0, singlesTeam = null;
  if(rd.singles!=null){
    const wonAll = rd.tricks.every(t=>t.winner===rd.singles);
    singlesGamePts = wonAll ? 3 : -3;
    if(rd.doubled) singlesGamePts *= 2;
    singlesTeam = TEAM[rd.singles];
    singlesNote = ` ${seatLabel(rd.singles)} played Singles and ${wonAll?'took every trick':'missed at least one trick'} (${singlesGamePts>0?'+':''}${singlesGamePts} game pts${rd.doubled?', doubled':''}).`;
  }
  let pairNote = '';
  ['A','B'].forEach(t=>{ if(rd.pairDeclared[t]) pairNote += ` Team ${t} banked the pair bonus (+4).`; });

  if(bidTeam==='A') G.scoreA = Math.max(0, G.scoreA + gamePts);
  else G.scoreB = Math.max(0, G.scoreB + gamePts);
  if(singlesTeam==='A') G.scoreA = Math.max(0, G.scoreA + singlesGamePts);
  else if(singlesTeam==='B') G.scoreB = Math.max(0, G.scoreB + singlesGamePts);

  if(G.boardMode==='double'){
    if(madeIt) G.boxes[bidTeam].red = true; else G.boxes[bidTeam].black = true;
  }

  const overText = `${seatLabel(rd.highBidder)}'s side needed ${rd.highBid} and took ${bidTeamPts} card points — ${madeIt?'bid made':'bid failed'}.${pairNote}${singlesNote}`;
  logMsg('Round over. '+overText);

  if(G.scoreA>=6 || G.scoreB>=6){
    G.matchOver = true;
    const winnerTeam = G.scoreA>=6 ? 'A':'B';
    rd.awaiting = {type:'matchEndAck', winnerTeam};
    pushState();
    return;
  }
  rd.awaiting = {type:'roundEndAck', overText};
  pushState();
}

/* ---------------- RENDERING ---------------- */
function renderTrumpSeed(){
  const el = document.getElementById('trumpSeed');
  const rd = G && G.round;
  if(!rd || rd.highBidder==null){ el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  const targetSeatEl = document.getElementById('seat'+slotOf(rd.highBidder));
  if(el.parentElement !== targetSeatEl) targetSeatEl.appendChild(el);
  if(!rd.trump){ el.innerHTML='<div style="font-size:9px">trump<br>hidden</div>'; el.classList.remove('revealed'); return; }
  if(rd.trumpRevealed){ el.innerHTML = `<div style="font-size:22px">${SUIT_SYM[rd.trump]}</div>`; el.classList.add('revealed'); }
  else { el.innerHTML='<div style="font-size:9px">trump<br>hidden</div>'; el.classList.remove('revealed'); }
}
function cardEl(card, extraClass){
  const div = document.createElement('div');
  const isRed = RED_SUITS.includes(card.s);
  div.className = `card ${isRed?'red':''} ${extraClass||''}`;
  div.innerHTML = `<div class="rank">${card.r}${SUIT_SYM[card.s]}</div><div class="suit">${SUIT_SYM[card.s]}</div><div class="rank bottom">${card.r}${SUIT_SYM[card.s]}</div>`;
  div.dataset.id = card.id;
  return div;
}
function setPlayable(ids){ PLAYABLE_IDS = ids || []; renderHand(); }
function renderHand(){
  const row = document.getElementById('handRow');
  row.innerHTML='';
  if(!G || !G.round || MY_SEAT==null) return;
  const hand = (G.round.hands[MY_SEAT]||[]).slice().sort((a,b)=>{
    if(a.s!==b.s) return SUITS.indexOf(a.s)-SUITS.indexOf(b.s);
    return rankIdx(a.r)-rankIdx(b.r);
  });
  for(const c of hand){
    const playable = PLAYABLE_IDS.includes(c.id);
    const el = cardEl(c, playable? 'playable':'disabled');
    if(playable){
      el.addEventListener('click', ()=>{ setPlayable([]); setPanelMsg('Playing...'); playCard(MY_SEAT, c); });
    }
    row.appendChild(el);
  }
}
function renderTable(){
  if(!G || !G.round || MY_SEAT==null) return;
  const rd = G.round;
  ['Left','Top','Right'].forEach(slot=>{
    const seat = [0,1,2,3].find(s=>slotOf(s)===slot);
    const wrap = document.getElementById('cb'+slot);
    wrap.innerHTML='';
    const n = rd.hands[seat] ? rd.hands[seat].length : 0;
    for(let i=0;i<n;i++){ const b=document.createElement('div'); b.className='cardback'; wrap.appendChild(b); }
    document.getElementById('seat'+slot).querySelector('.name').textContent = seatLabel(seat);
  });
  document.getElementById('seatBottom').querySelector('.name').textContent = 'You';

  ['Bottom','Left','Top','Right'].forEach(slot=>{
    document.getElementById('seat'+slot).classList.remove('active','bidder');
  });
  if(rd.highBidder!=null) document.getElementById('seat'+slotOf(rd.highBidder)).classList.add('bidder');
  if(rd.awaiting && (rd.awaiting.type==='bid' || rd.awaiting.type==='play') && rd.awaiting.seat!=null){
    document.getElementById('seat'+slotOf(rd.awaiting.seat)).classList.add('active');
  }

  ['Bottom','Left','Top','Right'].forEach(slot=>{
    const seat = [0,1,2,3].find(s=>slotOf(s)===slot);
    const slotEl = document.getElementById('slot'+slot);
    slotEl.innerHTML='';
    const card = rd.current[seat];
    if(card) slotEl.appendChild(cardEl(card,'trickcard'));
  });
  renderTrumpSeed();
}
function renderScore(){
  document.getElementById('scoreA').textContent = G.scoreA;
  document.getElementById('scoreB').textContent = G.scoreB;
}
function renderBoardStrip(){
  const el = document.getElementById('boardstrip');
  el.innerHTML='';
  if(!G || G.boardMode!=='double') return;
  ['A','B'].forEach(team=>{
    const label = document.createElement('div'); label.className='boxlabel';
    label.textContent = team==='A' ? (seatLabel(0)+' & '+seatLabel(2)) : (seatLabel(1)+' & '+seatLabel(3));
    const box = document.createElement('div'); box.className='box';
    const red = document.createElement('div'); red.className='cell red'+(G.boxes[team].red?' filled':'');
    const blk = document.createElement('div'); blk.className='cell black'+(G.boxes[team].black?' filled':'');
    box.appendChild(red); box.appendChild(blk);
    el.appendChild(label); el.appendChild(box);
  });
}
function renderLog(){
  const box = document.getElementById('logBox');
  box.innerHTML='';
  if(!G || !G.round || !G.round.log) return;
  for(const line of G.round.log){
    const d = document.createElement('div'); d.textContent=line; box.appendChild(d);
  }
}
function renderAll(){
  renderScore();
  renderBoardStrip();
  renderTable();
  renderHand();
  renderLog();
  checkToast();
}

/* ---------------- OVERLAYS (host-gated where noted) ---------------- */
function overlayBtnList(realBtns, requireHost){
  if(!requireHost || IS_HOST) return realBtns;
  return [{label:'Waiting for host…', cls:'ghost', fn:()=>{}}];
}
function showRedealOverlay(){
  const rd = G.round;
  const reasonText = rd.awaiting.reason==='jacks'
    ? `${seatLabel(rd.awaiting.seat)} held all four Jacks.`
    : rd.awaiting.reason==='notrumpshown'
    ? `The trump suit was never shown during play.`
    : `${seatLabel(rd.awaiting.seat)}'s side had no trump cards at all.`;
  showOverlay('Round Cancelled', reasonText+' Re-dealing with the next dealer.',
    overlayBtnList([{label:'Continue', cls:'primary', fn:()=>{
      hideOverlay(); G.dealer = nextSeat(G.dealer); hostStartRound();
    }}], true));
}
function showRoundEndOverlay(){
  showOverlay('Round Result', G.round.awaiting.overText,
    overlayBtnList([{label:'Next Round', cls:'primary', fn:()=>{
      hideOverlay(); G.dealer = nextSeat(G.dealer); hostStartRound();
    }}], true));
}
function showMatchEndOverlay(){
  const winnerTeam = G.round.awaiting.winnerTeam;
  const winnerNames = winnerTeam==='A' ? (seatLabel(0)+' & '+seatLabel(2)) : (seatLabel(1)+' & '+seatLabel(3));
  showOverlay(G.boardMode==='single' ? `${winnerNames} — 6 Love!` : 'Match Won',
    `${winnerNames} reached 6 points first and win the match.`,
    overlayBtnList([{label:'Play Again', cls:'primary', fn:()=>{ hideOverlay(); replayMatch(); }}], true));
}
function replayMatch(){
  G = { dealer:0, scoreA:0, scoreB:0, boardMode:G.boardMode, boxes:{A:{red:false,black:false},B:{red:false,black:false}}, matchOver:false };
  hostStartRound();
}

/* ---------------- PANEL / OVERLAY HELPERS ---------------- */
function setPanelMsg(t){ document.getElementById('panelMsg').textContent = t; }
function setPanelBtns(list){
  const row = document.getElementById('panelBtns');
  row.innerHTML='';
  for(const b of list){
    const btn = document.createElement('button');
    btn.className = 'btn '+(b.cls||'');
    btn.textContent = b.label;
    btn.addEventListener('click', b.fn);
    row.appendChild(btn);
  }
}
function hidePanelBtns(){ document.getElementById('panelBtns').innerHTML=''; }
function setCenterActions(list){
  const row = document.getElementById('centerActions');
  row.innerHTML='';
  for(const b of list){
    const btn = document.createElement('button');
    btn.className = 'btn '+(b.cls||'');
    btn.textContent = b.label;
    btn.addEventListener('click', b.fn);
    row.appendChild(btn);
  }
}
let lastToastId = null;
function checkToast(){
  if(!G || !G.round || !G.round.announcement) return;
  const ann = G.round.announcement;
  if(ann.id===lastToastId) return;
  lastToastId = ann.id;
  const el = document.getElementById('tableToast');
  el.textContent = ann.text;
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}
function announce(text){
  G.round.announcement = {id: Date.now()+'-'+Math.random(), text};
}
function clearDecisionUI(){
  setPanelBtns([]);
  setCenterActions([]);
  hideOverlay();
  PLAYABLE_IDS = [];
}
function showOverlay(title, text, btns){
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovText').textContent = text;
  const row = document.getElementById('ovBtns');
  row.innerHTML='';
  for(const b of btns){
    const btn = document.createElement('button');
    btn.className='btn '+(b.cls||'');
    btn.textContent=b.label;
    btn.addEventListener('click', b.fn);
    row.appendChild(btn);
  }
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }

document.getElementById('newGameBtn').addEventListener('click', ()=>{
  if(!IS_HOST) return;
  if(confirm('Start a new match with the same players?')) replayMatch();
});
document.getElementById('logToggle').addEventListener('click', ()=>{
  document.getElementById('logBox').classList.toggle('show');
});

/* ---------------- BOOT ---------------- */
function setVH(){ document.documentElement.style.setProperty('--vh', (window.innerHeight*0.01)+'px'); }
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', ()=>setTimeout(setVH,150));

auth.onAuthStateChanged(user=>{
  if(!user){ auth.signInAnonymously().catch(e=>console.error(e)); return; }
  myUid = user.uid;
  const urlCode = new URLSearchParams(location.search).get('room');
  if(urlCode){
    pendingJoinCode = urlCode.toUpperCase();
    nameFlowMode = 'join';
    document.getElementById('nameScreenTitle').textContent = 'Join Room '+pendingJoinCode;
    showScreen('screenName');
  } else {
    showScreen('screenHome');
  }
});
