<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>29 — Trump &amp; Trick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --felt-1:#0b3d2e;
  --felt-2:#0e4a37;
  --cream:#f3ead8;
  --ink:#1c1712;
  --gold:#c9a227;
  --gold-soft:#e6c65c;
  --red:#a83a3a;
  --teal:#2f6f62;
  --line: rgba(243,234,216,0.14);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;background:var(--felt-1);
  font-family:'Inter',sans-serif; color:var(--cream); overflow:hidden;}
body{
  background:
    radial-gradient(ellipse at 50% 20%, var(--felt-2), var(--felt-1) 70%);
}
.wrap{position:relative; width:100%; height:100vh; display:flex; flex-direction:column;}

/* ---- top bar ---- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; z-index:20;
  border-bottom:1px solid var(--line);
  background:rgba(0,0,0,0.15);
}
.brand{font-family:'Cinzel',serif; font-weight:700; letter-spacing:2px; font-size:15px; color:var(--gold-soft);}
.brand span{color:var(--cream); font-weight:600; letter-spacing:0;}
.scorepods{display:flex; gap:8px; align-items:center;}
.pod{
  display:flex; flex-direction:column; align-items:center;
  padding:3px 10px; border-radius:8px; border:1px solid var(--line);
  background:rgba(0,0,0,0.2); min-width:52px;
}
.pod .lbl{font-size:9px; letter-spacing:1px; opacity:0.7; text-transform:uppercase;}
.pod .val{font-family:'Cinzel',serif; font-size:18px; font-weight:700; color:var(--gold-soft);}
.menubtn{
  background:none; border:1px solid var(--line); color:var(--cream);
  border-radius:7px; padding:5px 9px; font-size:11px; font-family:'Inter';
}

/* ---- board / boxes for double board mode ---- */
.boardstrip{display:flex; gap:6px; padding:6px 12px; background:rgba(0,0,0,0.12); border-bottom:1px solid var(--line);}
.box{flex:1; display:flex; gap:4px;}
.cell{flex:1; height:16px; border-radius:3px; border:1px solid var(--line); opacity:0.35;}
.cell.red{background:var(--red);}
.cell.black{background:#111; }
.cell.filled{opacity:1;}
.boxlabel{font-size:9px; opacity:0.6; align-self:center; width:52px;}

/* ---- table ---- */
.table{
  position:relative; flex:1; min-height:0;
  display:grid;
  grid-template-rows: 74px 1fr 150px;
  padding:6px 8px 4px;
}
.seat{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:11px;
}
.seat .name{
  font-weight:600; padding:2px 9px; border-radius:20px;
  background:rgba(0,0,0,0.25); border:1px solid var(--line);
}
.seat.active .name{ border-color:var(--gold); color:var(--gold-soft); box-shadow:0 0 10px rgba(201,162,39,0.35);}
.seat.bidder .name::after{content:" ★"; color:var(--gold-soft);}
.seat .cardback-row{display:flex;}
.cardback{
  width:22px; height:31px; margin-left:-13px; border-radius:4px;
  background:linear-gradient(135deg, var(--teal), #1c4b40);
  border:1px solid rgba(243,234,216,0.35);
}
.cardback:first-child{margin-left:0;}

.topRow{ align-self:start; justify-self:center; }
.midRow{ display:flex; align-items:center; justify-content:space-between; position:relative;}
.leftSeat, .rightSeat{ align-self:center; }

.centerTrick{
  flex:1; position:relative; display:flex; align-items:center; justify-content:center;
  min-height:120px;
}
.trickslot{
  position:absolute; width:44px; height:62px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  transition: all .25s ease;
}
.trickslot.t0{ bottom:2px; }
.trickslot.t1{ left:6px; top:50%; transform:translateY(-50%);}
.trickslot.t2{ top:2px; }
.trickslot.t3{ right:6px; top:50%; transform:translateY(-50%);}

.trumpseed{
  position:absolute; top:4px; left:4px; width:30px; height:42px; border-radius:5px;
  background:linear-gradient(135deg, #3a2b0e, #1c1712);
  border:1.5px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; text-align:center; color:var(--gold-soft); font-family:'Cinzel';
}
.trumpseed.revealed{ background:var(--cream); color:var(--ink); }

.centermsg{
  position:absolute; text-align:center; font-family:'Cinzel',serif;
  color:var(--gold-soft); font-size:13px; padding:8px 14px; border-radius:10px;
  background:rgba(0,0,0,0.35); border:1px solid var(--line); max-width:260px;
}

/* ---- hand ---- */
.handzone{ display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:4px;}
.hand{ display:flex; justify-content:center; padding:2px 0; min-height:92px; }
.card{
  width:56px; height:82px; background:var(--cream); border-radius:7px;
  margin-left:-20px; box-shadow:0 3px 6px rgba(0,0,0,0.4);
  border:1px solid rgba(0,0,0,0.15);
  display:flex; flex-direction:column; justify-content:space-between; padding:4px 5px;
  color:var(--ink); font-weight:700; position:relative; transition: transform .15s ease;
}
.card:first-child{margin-left:0;}
.card.red{color:var(--red);}
.card.playable{ transform:translateY(-10px); box-shadow:0 6px 10px rgba(0,0,0,0.5);}
.card.disabled{ filter:grayscale(0.6) brightness(0.75);}
.card .rank{font-size:15px; font-family:'Cinzel',serif;}
.card .suit{font-size:20px; align-self:center;}
.card .rank.bottom{ align-self:flex-end; transform:rotate(180deg); }

.trickcard{ width:44px; height:62px; }
.trickcard .rank{font-size:12px;}
.trickcard .suit{font-size:15px;}

/* ---- action panel ---- */
.panel{
  position:absolute; left:0; right:0; bottom:0; z-index:30;
  background:linear-gradient(180deg, rgba(11,61,46,0), rgba(6,32,24,0.96) 30%);
  padding:8px 10px 10px; display:flex; flex-direction:column; gap:8px;
  align-items:center;
}
.panel .msg{font-size:12.5px; text-align:center; color:var(--gold-soft); font-family:'Cinzel',serif; min-height:16px;}
.rowbtns{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.btn{
  border:1px solid var(--gold); background:rgba(201,162,39,0.12); color:var(--cream);
  padding:8px 13px; border-radius:8px; font-size:12.5px; font-weight:600; font-family:'Inter';
}
.btn.primary{ background:var(--gold); color:var(--ink);}
.btn.ghost{ border-color:var(--line); background:rgba(0,0,0,0.2);}
.btn.suit-S,.btn.suit-C{color:var(--cream);}
.btn.suit-H,.btn.suit-D{color:#ffb3b3;}
.btn:disabled{opacity:0.35;}

.logbtn{position:absolute; top:8px; right:8px; z-index:25;}
.log{
  position:absolute; top:40px; right:6px; width:220px; max-height:200px; overflow:auto;
  background:rgba(0,0,0,0.75); border:1px solid var(--line); border-radius:8px; padding:8px;
  font-size:11px; line-height:1.5; z-index:40; display:none;
}
.log.show{display:block;}
.overlay{
  position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:50;
  display:flex; align-items:center; justify-content:center;
}
.overlay .card2{
  background:var(--felt-2); border:1px solid var(--gold); border-radius:14px;
  padding:22px 24px; max-width:300px; text-align:center;
}
.overlay h2{font-family:'Cinzel',serif; color:var(--gold-soft); margin:0 0 8px;}
.overlay p{font-size:13px; opacity:0.9; line-height:1.5;}
.hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">29 <span>Trump &amp; Trick</span></div>
    <div class="scorepods">
      <div class="pod"><div class="lbl">You&amp;Top</div><div class="val" id="scoreA">0</div></div>
      <div class="pod"><div class="lbl">Left&amp;Right</div><div class="val" id="scoreB">0</div></div>
    </div>
    <button class="menubtn" id="newGameBtn">New Match</button>
  </div>

  <div class="boardstrip" id="boardstrip"></div>

  <div class="table" id="tableArea">
    <div class="seat topRow" id="seat2">
      <div class="name">Top (Partner)</div>
      <div class="cardback-row" id="cb2"></div>
    </div>

    <div class="midRow">
      <div class="seat leftSeat" id="seat1">
        <div class="name">Left</div>
        <div class="cardback-row" id="cb1"></div>
      </div>

      <div class="centerTrick" id="centerTrick">
        <div class="trumpseed" id="trumpSeed">trump<br>hidden</div>
        <div class="trickslot t0" id="slot0"></div>
        <div class="trickslot t1" id="slot1"></div>
        <div class="trickslot t2" id="slot2"></div>
        <div class="trickslot t3" id="slot3"></div>
        <div class="centermsg hidden" id="centerMsg"></div>
      </div>

      <div class="seat rightSeat" id="seat3">
        <div class="name">Right</div>
        <div class="cardback-row" id="cb3"></div>
      </div>
    </div>

    <div class="seat" id="seat0" style="justify-self:center;">
      <div class="name">You</div>
    </div>
  </div>

  <div class="handzone">
    <div class="hand" id="handRow"></div>
  </div>

  <button class="menubtn logbtn" id="logToggle">Log</button>
  <div class="log" id="logBox"></div>

  <div class="panel">
    <div class="msg" id="panelMsg">Welcome — press New Match to deal.</div>
    <div class="rowbtns" id="panelBtns"></div>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="card2">
      <h2 id="ovTitle"></h2>
      <p id="ovText"></p>
      <div class="rowbtns" id="ovBtns" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script>
/* ================= CONFIG / SETUP NOTES =================
   A few rules in the brief left a couple of implementation choices open.
   These are called out inline as ASSUMPTIONS so they're easy to spot and
   correct once you try the prototype:
   - Turn order is anticlockwise: You(bottom) -> Right -> Top(partner) -> Left -> You.
     "Player to the right of the dealer" = the next seat in this order.
   - Trump suit is chosen freely by the bid winner (tap any suit), rather than
     restricted to a suit literally present in their 4-card hand.
   - Singles/Double (rules 9-11) are implemented in a simplified form:
     the bid winner may go Singles right after trump is set; the opposing
     side may then Double. Partner's cards in a Singles round are auto-folded
     (not played) — the rule text implies they don't play but a trick still
     needs cards, so we treat the single player as playing every trick alone
     against both opponents, tracked separately from the normal point tally.
   ========================================================== */

const SUITS = ['S','H','D','C'];
const SUIT_SYM = {S:'♠', H:'♥', D:'♦', C:'♣'};
const SUIT_NAME = {S:'Spades', H:'Hearts', D:'Diamonds', C:'Clubs'};
const RED_SUITS = ['H','D'];
// play rank order low->high, and points
const RANK_ORDER = ['7','8','Q','K','10','A','9','J'];
const RANK_POINTS = {'7':0,'8':0,'Q':0,'K':0,'10':1,'A':1,'9':2,'J':3};

const ORDER = [0,3,2,1]; // anticlockwise turn order, seat ids
const PARTNER = {0:2,1:3,2:0,3:1};
const TEAM = {0:'A',2:'A',1:'B',3:'B'}; // A = You+Top, B = Left+Right
const SEAT_LABEL = {0:'You',1:'Left',2:'Top',3:'Right'};

function nextSeat(s){ const i = ORDER.indexOf(s); return ORDER[(i+1)%4]; }

function freshDeck(){
  const d = [];
  for(const s of SUITS) for(const r of RANK_ORDER) d.push({s,r,id:s+r});
  return d;
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function rankIdx(r){ return RANK_ORDER.indexOf(r); }

let G = null; // global game state

function newMatch(){
  G = {
    dealer: 0,
    scoreA: 0, scoreB: 0,
    boardMode: 'single', // 'single' | 'double'
    boxes: {A:{red:false, black:false}, B:{red:false, black:false}},
    matchOver:false,
  };
  renderScore();
  chooseBoardMode();
}

function chooseBoardMode(){
  showOverlay('Choose your scoring board',
    'Single board: a straight race to 6, winner gets a "6 love" flourish.\nDouble board: each side has a red (win) and black (loss) box that only fill when that side\'s bid succeeds or fails.',
    [
      {label:'Single Board', cls:'primary', fn:()=>{G.boardMode='single'; hideOverlay(); startRound();}},
      {label:'Double Board', cls:'', fn:()=>{G.boardMode='double'; hideOverlay(); renderBoardStrip(); startRound();}},
    ]);
}

function renderBoardStrip(){
  const el = document.getElementById('boardstrip');
  el.innerHTML='';
  if(G.boardMode!=='double'){ return; }
  ['A','B'].forEach(team=>{
    const label = document.createElement('div');
    label.className='boxlabel';
    label.textContent = team==='A' ? 'You&Top' : 'Left&Right';
    const box = document.createElement('div'); box.className='box';
    const red = document.createElement('div'); red.className='cell red'+(G.boxes[team].red?' filled':'');
    const blk = document.createElement('div'); blk.className='cell black'+(G.boxes[team].black?' filled':'');
    box.appendChild(red); box.appendChild(blk);
    el.appendChild(label); el.appendChild(box);
  });
}

function renderScore(){
  document.getElementById('scoreA').textContent = G.scoreA;
  document.getElementById('scoreB').textContent = G.scoreB;
}

function log(msg){
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.textContent = msg;
  box.prepend(line);
}

/* ---------------- ROUND SETUP ---------------- */
function startRound(){
  if(G.matchOver) return;
  const deck = shuffle(freshDeck());
  const hands = {0:[],1:[],2:[],3:[]};
  // deal 4 each, in turn order starting from player right of dealer
  const first = nextSeat(G.dealer);
  let order4 = [];
  for(let k=0;k<4;k++) order4.push(ORDER[(ORDER.indexOf(first)+k)%4]);
  for(const seat of order4) hands[seat] = deck.splice(0,4);

  G.round = {
    deck, hands, order4, first,
    bidHistory: [], highBid: 0, highBidder: null,
    trump: null, trumpRevealed:false, trumpSeedCard:null,
    tricks: [], trickNo:0, leader:first,
    current: {}, // current trick cards by seat
    pointsA:0, pointsB:0,
    pairDeclared:{A:false,B:false},
    singles:null, doubled:false,
    phase:'bidding'
  };
  log(`— New round — dealer: ${SEAT_LABEL[G.dealer]}, first to bid: ${SEAT_LABEL[first]}`);
  renderTable();
  runBidding();
}

/* ---------------- HAND STRENGTH (for computer AI) ---------------- */
function handStrength(hand){
  // rough heuristic per suit: count + weighted honours
  const bySuit = {};
  for(const s of SUITS) bySuit[s] = [];
  for(const c of hand) bySuit[c.s].push(c.r);
  let best = {suit:null, score:-1};
  for(const s of SUITS){
    const cards = bySuit[s];
    let score = cards.length * 2;
    for(const r of cards) score += RANK_POINTS[r]*1.4 + (r==='9'?1:0);
    if(score>best.score) best = {suit:s, score};
  }
  return best;
}

/* ---------------- BIDDING ---------------- */
function runBidding(){
  const rd = G.round;
  rd.phase='bidding';
  rd.passed = new Set();
  bidTurn(rd.first);
}

function bidTurn(seat){
  const rd = G.round;
  if(rd.passed.size >= 3 && rd.highBidder!=null){
    finishBidding();
    return;
  }
  if(rd.passed.size === 4){
    // everyone passed, redeal
    log('All players passed — redealing.');
    rotateDealerAndRedeal();
    return;
  }
  if(seat===0){
    presentHumanBid();
    return;
  }
  // computer bid logic
  setTimeout(()=>{
    const hand = rd.hands[seat];
    const {suit, score} = handStrength(hand);
    const maxBid = Math.min(28, Math.round(16 + score/3));
    let action;
    if(rd.highBid===0){
      action = (score>9) ? {bid: 16} : {pass:true};
    } else if(rd.highBid < maxBid && rd.highBid < 28){
      action = {bid: rd.highBid+1};
    } else {
      action = {pass:true};
    }
    if(action.pass){
      rd.passed.add(seat);
      log(`${SEAT_LABEL[seat]} passes.`);
    } else {
      rd.highBid = action.bid;
      rd.highBidder = seat;
      rd.bestSuitHint = rd.bestSuitHint || {}; rd.bestSuitHint[seat]=suit;
      log(`${SEAT_LABEL[seat]} bids ${action.bid}.`);
    }
    advanceBid(seat);
  }, 550);
}

function advanceBid(seat){
  const rd = G.round;
  if(rd.passed.size>=3 && rd.highBidder!=null){ finishBidding(); return; }
  if(rd.passed.size===4){ log('All players passed — redealing.'); rotateDealerAndRedeal(); return; }
  bidTurn(nextSeat(seat));
}

function presentHumanBid(){
  const rd = G.round;
  const canBid = rd.highBid < 28;
  const nextVal = Math.max(16, rd.highBid+1);
  setPanelMsg(`Your bid to make (current high: ${rd.highBid||'none'})`);
  const btns = [];
  if(canBid) btns.push({label:`Bid ${nextVal}`, cls:'primary', fn:()=>{
    rd.highBid = nextVal; rd.highBidder = 0;
    log(`You bid ${nextVal}.`);
    advanceBid(0);
  }});
  btns.push({label:'Pass', cls:'ghost', fn:()=>{
    rd.passed.add(0);
    log('You pass.');
    advanceBid(0);
  }});
  setPanelBtns(btns);
}

function rotateDealerAndRedeal(){
  G.dealer = nextSeat(G.dealer);
  startRound();
}

function finishBidding(){
  const rd = G.round;
  log(`${SEAT_LABEL[rd.highBidder]} won the bid at ${rd.highBid}.`);
  renderTable();
  if(rd.highBidder===0){
    presentTrumpChoice();
  } else {
    // computer picks trump: best suit from its 4-card hand
    const {suit} = handStrength(rd.hands[rd.highBidder]);
    setTrump(suit);
  }
}

function presentTrumpChoice(){
  setPanelMsg('You won the bid! Secretly choose your trump suit (hidden from others).');
  const btns = SUITS.map(s=>({label:`${SUIT_SYM[s]} ${SUIT_NAME[s]}`, cls:'btn suit-'+s,
    fn:()=>{ hidePanelBtns(); setTrump(s); }}));
  setPanelBtns(btns);
}

function setTrump(suit){
  const rd = G.round;
  rd.trump = suit;
  rd.trumpRevealed = false;
  log(`Trump chosen secretly by ${SEAT_LABEL[rd.highBidder]}.`);
  dealRemaining();
}

/* ---------------- DEAL REMAINING 4 ---------------- */
function dealRemaining(){
  const rd = G.round;
  const order4 = rd.order4;
  for(const seat of order4) rd.hands[seat].push(...rd.deck.splice(0,4));

  // Rule 7: if one player has all four Jacks -> cancel round
  for(const seat of [0,1,2,3]){
    const js = rd.hands[seat].filter(c=>c.r==='J').length;
    if(js===4){
      log(`${SEAT_LABEL[seat]} was dealt all four Jacks — round cancelled, redealing.`);
      renderTable();
      showOverlay('Round Cancelled', `${SEAT_LABEL[seat]} held all four Jacks. Re-dealing with the next dealer.`,
        [{label:'Continue', cls:'primary', fn:()=>{hideOverlay(); rotateDealerAndRedeal();}}]);
      return;
    }
  }
  // Rule 8: bidder + partner must have at least one trump card between them
  const partner = PARTNER[rd.highBidder];
  const teamTrumpCount = rd.hands[rd.highBidder].filter(c=>c.s===rd.trump).length
                       + rd.hands[partner].filter(c=>c.s===rd.trump).length;
  if(teamTrumpCount===0){
    log('Bidding side has no trump cards at all — round cancelled, redealing.');
    renderTable();
    showOverlay('Round Cancelled', `${SEAT_LABEL[rd.highBidder]}'s side has no ${SUIT_NAME[rd.trump]} between them. Re-dealing.`,
      [{label:'Continue', cls:'primary', fn:()=>{hideOverlay(); rotateDealerAndRedeal();}}]);
    return;
  }

  renderTable();
  offerSingles();
}

/* ---------------- SINGLES / DOUBLE (simplified) ---------------- */
function offerSingles(){
  const rd = G.round;
  if(rd.highBidder===0){
    setPanelMsg('All 8 cards dealt. Want to play this round Singles (alone, no partner) for a shot at +3 / risk of -3?');
    setPanelBtns([
      {label:'Play Singles', cls:'primary', fn:()=>{ rd.singles = 0; log('You go Singles.'); afterSinglesDecision(); }},
      {label:'Play Normally', cls:'ghost', fn:()=>{ afterSinglesDecision(); }}
    ]);
  } else {
    // computer bidder rarely goes singles unless very strong hand
    const hand = rd.hands[rd.highBidder];
    const {score} = handStrength(hand);
    if(score>16 && Math.random()<0.3){
      rd.singles = rd.highBidder;
      log(`${SEAT_LABEL[rd.highBidder]} goes Singles!`);
    }
    afterSinglesDecision();
  }
}

function afterSinglesDecision(){
  const rd = G.round;
  if(rd.singles!=null){
    const opponentSeat = nextSeat(rd.singles); // any opponent decides double
    if(opponentSeat===0 || nextSeat(opponentSeat)===0 || true){
      // let human double if human is on opposing team and not the singles player
      const human0IsOpponent = TEAM[0]!==TEAM[rd.singles];
      if(human0IsOpponent){
        setPanelMsg(`${SEAT_LABEL[rd.singles]} is playing Singles. Double the stakes?`);
        setPanelBtns([
          {label:'Double', cls:'primary', fn:()=>{ rd.doubled=true; log('You double the Singles bet.'); beginPlay(); }},
          {label:'No thanks', cls:'ghost', fn:()=>{ beginPlay(); }},
        ]);
        return;
      } else {
        // computer opponent decides
        if(Math.random()<0.35){ rd.doubled=true; log('Opponents double the Singles bet.'); }
        beginPlay();
        return;
      }
    }
  }
  beginPlay();
}

/* ---------------- PLAY ---------------- */
function beginPlay(){
  const rd = G.round;
  rd.phase='play';
  rd.leader = rd.first; // player to the right of the dealer leads first trick
  renderTable();
  playTurn(rd.leader);
}

function legalCards(seat){
  const rd = G.round;
  const hand = rd.hands[seat];
  const ledSuit = rd.leadSuit;
  if(!ledSuit) return hand.slice(); // leading: any card
  const followers = hand.filter(c=>c.s===ledSuit);
  if(followers.length>0) return followers;
  return hand.slice(); // can't follow: trump or discard, all allowed to pick from
}

function playTurn(seat){
  const rd = G.round;
  if(seatOutOfPlay(seat)){
    // singles: partner of the lone player never plays
    playTurn(nextSeat(seat));
    return;
  }
  const legal = legalCards(seat);
  // auto-play if only one legal card in hand overall (per your rule: only one card possible => auto play)
  if(legal.length===1 && rd.hands[seat].length===1){
    playCard(seat, legal[0]);
    return;
  }
  if(seat===0){
    presentHumanPlay(legal);
  } else {
    setTimeout(()=>computerPlay(seat, legal), 700);
  }
}

function seatOutOfPlay(seat){
  const rd = G.round;
  if(rd.singles==null) return false;
  const singlePartner = PARTNER[rd.singles];
  return seat===singlePartner;
}

function presentHumanPlay(legal){
  setPanelMsg('Your turn — tap a highlighted card to play it.');
  renderHand(legal.map(c=>c.id));
  // pair declare option
  const rd = G.round;
  const trumpKQ = rd.hands[0].filter(c=>c.s===rd.trump && (c.r==='K'||c.r==='Q'));
  const myTeam = TEAM[0];
  const btns = [];
  if(trumpKQ.length===2 && !rd.pairDeclared[myTeam]){
    btns.push({label:'Declare Pair (+4)', cls:'primary', fn:()=>{
      rd.pairDeclared[myTeam]=true;
      log('You declare the pair (King+Queen of trump) — +4 bonus banked.');
      presentHumanPlay(legal);
    }});
  }
  // trump-guess option when human can't follow suit and trump not yet revealed and human isn't the bidder
  if(rd.leadSuit && legal.some(c=>c.s!==rd.leadSuit) && legalIsDiscardOnly(0) && !rd.trumpRevealed && rd.highBidder!==0){
    btns.push({label:'Guess Trump Suit', cls:'ghost', fn:()=>offerTrumpGuess(0)});
  }
  setPanelBtns(btns);
}

function legalIsDiscardOnly(seat){
  const rd = G.round;
  const hand = rd.hands[seat];
  if(!rd.leadSuit) return false;
  return !hand.some(c=>c.s===rd.leadSuit);
}

function offerTrumpGuess(seat){
  setPanelMsg('Guess the hidden trump suit. Correct: you trump this trick. Wrong: you must discard normally.');
  const btns = SUITS.map(s=>({label:`${SUIT_SYM[s]} ${SUIT_NAME[s]}`, cls:'btn suit-'+s, fn:()=>resolveTrumpGuess(seat,s)}));
  btns.push({label:'Cancel', cls:'ghost', fn:()=>presentHumanPlay(legalCards(seat))});
  setPanelBtns(btns);
}

function resolveTrumpGuess(seat, guess){
  const rd = G.round;
  if(guess===rd.trump){
    log(`${SEAT_LABEL[seat]} guessed the trump suit correctly! Trump is now revealed: ${SUIT_SYM[rd.trump]} ${SUIT_NAME[rd.trump]}.`);
    rd.trumpRevealed = true;
    renderTrumpSeed();
    const trumpCards = rd.hands[seat].filter(c=>c.s===rd.trump);
    if(seat===0){
      renderHand(trumpCards.map(c=>c.id));
      setPanelMsg('Correct! Choose your trump card to play.');
      setPanelBtns([]);
    } else {
      const pick = trumpCards[Math.floor(Math.random()*trumpCards.length)];
      playCard(seat, pick);
    }
  } else {
    log(`${SEAT_LABEL[seat]} guessed wrong (not ${SUIT_NAME[guess]}) — must discard normally, no trump this time.`);
    if(seat===0){
      const discardable = rd.hands[0].filter(c=>c.s!==rd.trump || true);
      renderHand(rd.hands[0].filter(c=>c.s!==rd.leadSuit).map(c=>c.id));
      setPanelMsg('Wrong guess — pick any card to discard.');
      setPanelBtns([]);
    } else {
      const discardable = rd.hands[seat].filter(c=>c.s!==rd.leadSuit);
      const pick = discardable[Math.floor(Math.random()*discardable.length)];
      playCard(seat, pick);
    }
  }
}

function computerPlay(seat, legal){
  const rd = G.round;
  // if bidder and can't follow and has trump, reveal by playing trump sometimes
  let choice;
  if(rd.leadSuit && legalIsDiscardOnly(seat)){
    const trumpsInHand = legal.filter(c=>c.s===rd.trump);
    if(seat===rd.highBidder && trumpsInHand.length>0 && !rd.trumpRevealed){
      choice = trumpsInHand[0];
      rd.trumpRevealed = true;
      log(`${SEAT_LABEL[seat]} plays a trump — trump is now revealed: ${SUIT_SYM[rd.trump]} ${SUIT_NAME[rd.trump]}.`);
      renderTrumpSeed();
    } else if(seat!==rd.highBidder && !rd.trumpRevealed && Math.random()<0.25){
      // attempt a guess
      const guess = SUITS[Math.floor(Math.random()*4)];
      resolveTrumpGuess(seat, guess);
      return;
    } else if(rd.trumpRevealed && trumpsInHand.length>0 && Math.random()<0.6){
      choice = trumpsInHand[0];
    } else {
      const nonTrump = legal.filter(c=>c.s!==rd.trump);
      choice = (nonTrump.length? nonTrump: legal)[0];
    }
  } else {
    // following suit or leading: play lowest value non-committal card (simple heuristic)
    choice = legal.slice().sort((a,b)=>rankIdx(a.r)-rankIdx(b.r))[0];
    if(!rd.leadSuit){
      // leading: lead a safe low card from longest suit
      choice = legal.slice().sort((a,b)=>rankIdx(a.r)-rankIdx(b.r))[0];
    }
  }
  playCard(seat, choice);
}

function playCard(seat, card){
  const rd = G.round;
  rd.hands[seat] = rd.hands[seat].filter(c=>c.id!==card.id);
  rd.current[seat] = card;
  if(!rd.leadSuit) rd.leadSuit = card.s;
  log(`${SEAT_LABEL[seat]} plays ${card.r}${SUIT_SYM[card.s]}.`);
  renderTable();

  const playedSeats = Object.keys(rd.current).map(Number);
  if(playedSeats.length + countOutOfPlaySeats() === 4){
    setTimeout(resolveTrick, 700);
  } else {
    setTimeout(()=>playTurn(nextSeat(seat)), 60);
  }
}

function countOutOfPlaySeats(){
  const rd = G.round;
  if(rd.singles==null) return 0;
  return 1; // partner sits out always
}

function resolveTrick(){
  const rd = G.round;
  const entries = Object.entries(rd.current).map(([s,c])=>({seat:Number(s), card:c}));
  let winner = entries[0];
  for(const e of entries.slice(1)){
    winner = beats(e.card, winner.card, rd) ? e : winner;
  }
  const pts = entries.reduce((sum,e)=>sum+RANK_POINTS[e.card.r],0);
  const team = TEAM[winner.seat];
  if(team==='A') rd.pointsA += pts; else rd.pointsB += pts;
  rd.tricks.push({winner:winner.seat, cards:entries, pts});
  log(`${SEAT_LABEL[winner.seat]} wins the trick (${pts} pts).`);

  rd.current = {};
  rd.leadSuit = null;
  rd.trickNo++;
  renderTable();

  const cardsLeft = rd.hands[0].length; // any seat's remaining count is a fine proxy since equal
  if(cardsLeft===0){
    setTimeout(endRound, 500);
  } else {
    rd.leader = winner.seat;
    setTimeout(()=>playTurn(winner.seat), 500);
  }
}

function beats(card, currentBest, rd){
  const trump = rd.trumpRevealed ? rd.trump : null;
  const cIsTrump = trump && card.s===trump;
  const bIsTrump = trump && currentBest.s===trump;
  if(cIsTrump && !bIsTrump) return true;
  if(!cIsTrump && bIsTrump) return false;
  if(cIsTrump && bIsTrump) return rankIdx(card.r) > rankIdx(currentBest.r);
  // neither trump: must be same suit as best to beat it (else irrelevant discard)
  if(card.s!==currentBest.s) return false;
  return rankIdx(card.r) > rankIdx(currentBest.r);
}

/* ---------------- ROUND END / SCORING ---------------- */
function endRound(){
  const rd = G.round;
  const bidTeam = TEAM[rd.highBidder];
  const bidTeamPts = bidTeam==='A' ? rd.pointsA : rd.pointsB;
  const otherTeam = bidTeam==='A' ? 'B':'A';

  let bonus = 0;
  if(rd.pairDeclared.A) bonus += (bidTeam==='A'? 0:0); // pair bonus applies to declaring team's own total, handled below
  const madeIt = bidTeamPts >= rd.highBid;

  let gamePts = madeIt ? 1 : -1;

  // Singles (simplified): bid winner going alone needs literally all 8 tricks.
  // Scored as its own separate game-point swing (+3/-3, doubled to +6/-6),
  // on top of (not instead of) the normal bid result above.
  let singlesNote = '';
  let singlesGamePts = 0;
  let singlesTeam = null;
  if(rd.singles!=null){
    const wonAll = rd.tricks.every(t=>t.winner===rd.singles);
    singlesGamePts = wonAll ? 3 : -3;
    if(rd.doubled) singlesGamePts *= 2;
    singlesTeam = TEAM[rd.singles];
    singlesNote = ` ${SEAT_LABEL[rd.singles]} played Singles and ${wonAll?'took every trick':'missed at least one trick'} (${singlesGamePts>0?'+':''}${singlesGamePts} game pts${rd.doubled?', doubled':''}).`;
  }

  // Pair bonus: +4 raw card points to whichever side declared it, added before comparing... for simplicity we log it as a note,
  // since bidding success already resolved above; we still reflect it as an extra +1 game point swing if it flipped the result.
  let pairNote = '';
  ['A','B'].forEach(t=>{
    if(rd.pairDeclared[t]) pairNote += ` ${t==='A'?'You & Top':'Left & Right'} banked the pair bonus (+4).`;
  });

  if(bidTeam==='A') G.scoreA = Math.max(0, G.scoreA + gamePts);
  else G.scoreB = Math.max(0, G.scoreB + gamePts);

  if(singlesTeam==='A') G.scoreA = Math.max(0, G.scoreA + singlesGamePts);
  else if(singlesTeam==='B') G.scoreB = Math.max(0, G.scoreB + singlesGamePts);

  if(G.boardMode==='double'){
    if(madeIt) G.boxes[bidTeam].red = true; else G.boxes[bidTeam].black = true;
    renderBoardStrip();
  }

  log(`Round over. Bid: ${SEAT_LABEL[rd.highBidder]} (${bidTeam}) needed ${rd.highBid}, got ${bidTeamPts}. ${madeIt?'Made it! +1':'Failed. -1'}.${pairNote}${singlesNote}`);
  renderScore();

  const overText = `${SEAT_LABEL[rd.highBidder]}'s side needed ${rd.highBid} and took ${bidTeamPts} card points — ${madeIt?'bid made':'bid failed'}.${pairNote}${singlesNote}`;

  if(G.scoreA>=6 || G.scoreB>=6){
    G.matchOver = true;
    const winnerTeam = G.scoreA>=6 ? 'A':'B';
    showOverlay(G.boardMode==='single' ? `${winnerTeam==='A'?'You & Top':'Left & Right'} — 6 Love!` : 'Match Won',
      `${winnerTeam==='A'?'You & Top':'Left & Right'} reached 6 points first and win the match.`,
      [{label:'New Match', cls:'primary', fn:()=>{hideOverlay(); newMatch();}}]);
    return;
  }

  showOverlay('Round Result', overText, [
    {label:'Next Round', cls:'primary', fn:()=>{ hideOverlay(); G.dealer = nextSeat(G.dealer); startRound(); }}
  ]);
}

/* ---------------- RENDERING ---------------- */
function renderTrumpSeed(){
  const el = document.getElementById('trumpSeed');
  const rd = G.round;
  if(!rd || !rd.trump){ el.textContent='trump\nhidden'; el.classList.remove('revealed'); return; }
  if(rd.trumpRevealed){
    el.innerHTML = `<div style="font-size:16px">${SUIT_SYM[rd.trump]}</div>`;
    el.classList.add('revealed');
  } else {
    el.textContent='trump\nhidden';
    el.classList.remove('revealed');
  }
}

function cardEl(card, extraClass){
  const div = document.createElement('div');
  const isRed = RED_SUITS.includes(card.s);
  div.className = `card ${isRed?'red':''} ${extraClass||''}`;
  div.innerHTML = `<div class="rank">${card.r}${SUIT_SYM[card.s]}</div><div class="suit">${SUIT_SYM[card.s]}</div><div class="rank bottom">${card.r}${SUIT_SYM[card.s]}</div>`;
  div.dataset.id = card.id;
  return div;
}

function renderHand(playableIds){
  const row = document.getElementById('handRow');
  row.innerHTML='';
  if(!G.round) return;
  const hand = G.round.hands[0].slice().sort((a,b)=>{
    if(a.s!==b.s) return SUITS.indexOf(a.s)-SUITS.indexOf(b.s);
    return rankIdx(a.r)-rankIdx(b.r);
  });
  for(const c of hand){
    const playable = playableIds && playableIds.includes(c.id);
    const el = cardEl(c, playable? 'playable':'disabled');
    if(playable){
      el.addEventListener('click', ()=>{
        hidePanelBtns();
        setPanelMsg('Playing...');
        playCard(0, c);
      });
    }
    row.appendChild(el);
  }
}

function renderTable(){
  if(!G.round){ return; }
  const rd = G.round;
  // cardbacks for computer seats
  [1,2,3].forEach(s=>{
    const wrap = document.getElementById('cb'+s);
    wrap.innerHTML='';
    const n = rd.hands[s].length;
    for(let i=0;i<n;i++){ const b=document.createElement('div'); b.className='cardback'; wrap.appendChild(b); }
  });
  renderHand([]); // default: nothing playable until prompted

  // active seat highlight
  [0,1,2,3].forEach(s=>{
    document.getElementById('seat'+s).classList.remove('active','bidder');
  });
  if(rd.highBidder!=null) document.getElementById('seat'+rd.highBidder).classList.add('bidder');

  // trick slots
  for(let s=0;s<4;s++){
    const slot = document.getElementById('slot'+s);
    slot.innerHTML='';
    const card = rd.current[s];
    if(card) slot.appendChild(cardEl(card,'trickcard'));
  }
  renderTrumpSeed();
}

/* ---------------- PANEL / OVERLAY HELPERS ---------------- */
function setPanelMsg(t){ document.getElementById('panelMsg').textContent = t; }
function setPanelBtns(list){
  const row = document.getElementById('panelBtns');
  row.innerHTML='';
  for(const b of list){
    const btn = document.createElement('button');
    btn.className = 'btn '+(b.cls||'');
    btn.textContent = b.label;
    btn.addEventListener('click', b.fn);
    row.appendChild(btn);
  }
}
function hidePanelBtns(){ document.getElementById('panelBtns').innerHTML=''; }

function showOverlay(title, text, btns){
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovText').textContent = text;
  const row = document.getElementById('ovBtns');
  row.innerHTML='';
  for(const b of btns){
    const btn = document.createElement('button');
    btn.className='btn '+(b.cls||'');
    btn.textContent=b.label;
    btn.addEventListener('click', b.fn);
    row.appendChild(btn);
  }
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }

document.getElementById('newGameBtn').addEventListener('click', newMatch);
document.getElementById('logToggle').addEventListener('click', ()=>{
  document.getElementById('logBox').classList.toggle('show');
});

newMatch();
</script>
